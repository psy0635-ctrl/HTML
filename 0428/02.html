<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* ─── 공통 박스 스타일 ─── */
        .box
        {
            width: 100px;
            height: 100px;
            position: absolute; /* 부모(div) 기준으로 위치를 직접 지정 가능해짐 */
        }

        /* ─── 첫 번째 박스 (빨강) ─── */
        .box:nth-child(1)        /* 부모 안에서 1번째 자식 요소에만 적용 */
        {
            background-color: red;
            left: 10px;          /* 부모 왼쪽 기준으로 10px 떨어진 위치 */
            top: 10px;           /* 부모 위쪽 기준으로 10px 떨어진 위치 */
            z-index: 100;        /* 숫자가 클수록 앞으로 나옴 → 가장 앞에 표시 */
        }

        /* ─── 두 번째 박스 (초록) ─── */
        .box:nth-child(2)        /* 부모 안에서 2번째 자식 요소에만 적용 */
        {
            background-color: green;
            left: 50px;          /* 오른쪽으로 50px */
            top: 50px;           /* 아래쪽으로 50px */
            z-index: 50;         /* 빨강(100)보다 뒤, 파랑(기본값 0)보다 앞 */
        }

        /* ─── 세 번째 박스 (파랑) ─── */
        .box:nth-child(3)        /* 부모 안에서 3번째 자식 요소에만 적용 */
        {
            background-color: blue;
            left: 90px;          /* 오른쪽으로 90px */
            top: 90px;           /* 아래쪽으로 90px */
                                 /* z-index 미설정 → 기본값 0 → 가장 뒤에 표시 */
        }

        /* ─── 바깥 컨테이너 div (body의 직계 자식 div) ─── */
        body > div               /* body 바로 아래의 div에만 적용 */
        {
            width: 500px;
            height: 100px;       /* 높이를 100px로 제한 → 박스들이 영역 밖으로 넘침 */
            border-width: 10px;
            border-color: black;
            border-style: solid; /* 검정 실선 테두리 */

            position: relative;  /* 자식 .box들의 absolute 기준점이 이 div가 됨 */

            overflow-y: scroll;  /* 세로로 넘치는 내용은 스크롤로 보여줌 */
            /* overflow: hidden; */  /* ← 주석 처리됨: 이걸 켜면 넘치는 부분을 완전히 숨김 */
        }

    </style>
</head>
<body>

    <h1>Box의 위쪽에 있는 h1</h1>

    <!-- 
        바깥 컨테이너 div
        - position: relative  → 안의 .box들이 이 div를 기준으로 절대 위치 계산
        - height: 100px       → 박스(100px)보다 컨테이너가 작아서 내용이 넘침
        - overflow-y: scroll  → 넘친 부분을 스크롤로 처리
    -->
    <div>

        <!-- 빨강 박스: z-index 100 → 가장 앞, 위치 (10, 10) -->
        <div class="box"></div>

        <!-- 초록 박스: z-index 50  → 중간,   위치 (50, 50) -->
        <div class="box"></div>

        <!-- 파랑 박스: z-index 없음 → 가장 뒤, 위치 (90, 90) -->
        <div class="box"></div>

    </div>

    <h1>Box의 아래쪽에 있는 h1</h1>

</body>
</html>
