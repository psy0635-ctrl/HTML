<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면 대응 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>구조 선택자</title>

    <!-- 구조 선택자 CSS -->
    <style>
        /* ul 기본 설정 */
        ul{
            overflow: hidden; 
            /* float 요소(li)를 감싸기 위해 사용 (부모 높이 유지) */
        }

        /* 모든 li 공통 스타일 */
        li{
            list-style: none;     /* ● 점 제거 */
            float: left;          /* 가로 정렬 (왼쪽부터 나열) */
            width: 100px;         /* 너비 고정 */
            padding: 20px;        /* 안쪽 여백 */
            color: #ffffff;       /* 글자색: 흰색 */
            font-weight: bold;    /* 글자 굵게 */
            text-align: center;   /* 가운데 정렬 */
        }

        /* 첫 번째 li만 선택 */
        li:first-child{
            border-radius: 10px 0 0 10px;
            /* 왼쪽 위/아래만 둥글게 → 메뉴 시작 부분 */
        }

        /* 마지막 li만 선택 */
        li:last-child{
            border-radius: 0 10px 10px 0;
            /* 오른쪽 위/아래만 둥글게 → 메뉴 끝 부분 */
        }

        /* 짝수 번째 요소 (2, 4, 6, ...) */
        li:nth-child(2n){
            background-color: blue;
        }

        /* 홀수 번째 요소 (1, 3, 5, ...) */
        li:nth-child(2n+1){
            background-color: green;
        }

    </style>
</head>

<body>

    <ul>
        <li>첫번째</li>   <!-- 1번 (홀수) → 초록 -->
        <li>두번째</li>   <!-- 2번 (짝수) → 파랑 -->
        <li>세번째</li>   <!-- 3번 (홀수) → 초록 -->
        <li>네번째</li>   <!-- 4번 (짝수) → 파랑 -->
        <li>다섯번째</li> <!-- 5번 (홀수) → 초록 -->
        <li>여섯번째</li> <!-- 6번 (짝수) → 파랑 -->
        <li>일곱번째</li> <!-- 7번 (홀수) → 초록 -->
    </ul>

</body>
</html>
