<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면 대응 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>구조 선택자</title>

    <!-- 구조 선택자 -->
    <style>
        /* 
        li:first-child  → 첫 번째 li 선택
        > a             → 그 li의 "직계 자식" a 태그 선택
        */

        li:first-child > a {
            color: blue;  /* 첫 번째 메뉴의 글자색만 파란색 */
        }
    </style>
</head>

<body>

    <ul>
        <li><a href="#"> 첫번째</a></li>   <!-- 이 a만 파란색 -->
        <li><a href="#"> 두번째</a></li>
        <li><a href="#"> 세번째</a></li>
        <li><a href="#"> 네번째</a></li>
        <li><a href="#"> 다섯번째</a></li>
        <li><a href="#"> 여섯번째</a></li>
        <li><a href="#"> 일곱번째</a></li>
    </ul>

</body>
</html>
