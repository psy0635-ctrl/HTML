<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태 선택자</title>
    <!--    상태 선택자    -->
    <style>
        input:enabled{  /* 사용 가능한(input에 disabled가 없는 경우) */
            background-color: green
        }
        input:disabled{  /* 사용 불가능한(input에 disabled 속성이 있는 경우) */
            background-color: red;
        }
        input:focus{ /* 입력창이 선택(클릭 or 포커스)된 상태 */
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type ="text"><br><br>
    
    <h1>사용 불가능한 상태</h1>
    <input type ="text" disabled><br><br>
    
</body>
</html>
