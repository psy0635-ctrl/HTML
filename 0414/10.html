<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 반응형 화면 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <style>
        div{
            width: 700px;
            /* 콘텐츠 가로 크기 */

            border-width: 10px;
            /* 테두리 두께 */

            border-style: dotted;
            /* 점선 테두리 */

            border-color: cadetblue;
            /* 테두리 색상 */

            text-align: center;
            /* 텍스트 가로 가운데 정렬 */

            padding: 20px;
            /* 안쪽 여백 (텍스트와 테두리 사이 공간) */

            border-radius: 30px 30px 0 0;
            /* 
            모서리 둥글게 만들기

            순서: 왼쪽 위 → 오른쪽 위 → 오른쪽 아래 → 왼쪽 아래

            30px 30px 0 0
            → 위쪽 두 모서리만 둥글게
            → 아래는 각지게 유지
            */
        }
    </style>
</head>

<body>

    <!-- 박스 하나 생성 -->
    <div>
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </div>

</body>
</html>
