<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    div{
        width : 300px;   /* 콘텐츠 영역의 가로 크기 */
        height : 300px;  /* 콘텐츠 영역의 세로 크기 */

        background-color: blue;  /* 배경색: 파랑 */
        color: #fff;             /* 글자색: 흰색 */

        border : 10px solid rgb(75, 221, 75); 
        /* 테두리 두께 10px, 실선, 초록색 */

        margin: 50px;  
        /* 바깥 여백 (다른 요소와의 거리) */

        padding: 50px; 
        /* 안쪽 여백 (내용과 테두리 사이 공간) */

        text-align: center; 
        /* 가로 가운데 정렬 */

        line-height: 300px;
        /* 세로 가운데 정렬 (높이와 같게 해서 가운데 배치) */
    }
</style>
</head>
<body>
    <div>박스 속성과 값을 설정하는 방법</div>
</body>
</html>
