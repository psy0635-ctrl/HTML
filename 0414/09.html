<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면 대응 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

<style>
    /* =========================
       첫 번째 박스 (div1)
       ========================= */
    .div1 {
        width : 300px;   /* 콘텐츠 영역 가로 크기 */
        height : 300px;  /* 콘텐츠 영역 세로 크기 */

        background-color: blue;  /* 배경색: 파랑 */
        color: #fff;             /* 글자색: 흰색 */

        border : 10px double rgb(56, 125, 75); 
        /* 
        border: 두께 스타일 색상
        double → 이중 테두리
        */

        margin: 50px 50px 0 50px;  
        /* 바깥 여백 (위 오른쪽 아래 왼쪽)
           아래쪽은 0이라 다음 요소와 붙음 */

        padding: 0 50px 0 50px; 
        /* 안쪽 여백 → 좌우만 50px */

        text-align: center; 
        /* 텍스트 가로 가운데 정렬 */

        line-height: 300px;
        /* 높이와 같게 설정 → 세로 가운데 정렬 */
    }

    /* =========================
       두 번째 박스 (div2)
       ========================= */
    .div2 {
        width : 400px;   /* 콘텐츠 가로 */
        height : 400px;  /* 콘텐츠 세로 */

        background-color: green;  /* 배경색: 초록 */
        color: #fff;              /* 글자색 */

        border : 20px ridge rgb(75, 221, 75); 
        /* 
        ridge → 입체적으로 튀어나온 느낌
        border 두께가 더 두꺼움 (20px)
        */

        margin: 50px 50px 0 50px;  
        padding: 0 50px 0 50px; 

        text-align: center; 
        line-height: 400px; /* 세로 가운데 정렬 */
    }

    /* =========================
       세 번째 박스 (div3)
       ========================= */
    .div3 {
        width : 500px;   /* 콘텐츠 가로 */
        height : 500px;  /* 콘텐츠 세로 */

        background-color: purple;  /* 배경색: 보라 */
        color: #fff;               /* 글자색 */

        /* border를 각각 따로 설정 */
        border-width: 30px;   /* 테두리 두께 */
        border-style: outset; /* 바깥으로 튀어나온 느낌 */
        border-color: azure;  /* 테두리 색상 */

        margin: 50px 50px 0 50px;  
        padding: 0 50px 0 50px; 

        text-align: center; 
        line-height: 500px; /* 세로 가운데 정렬 */
    }
</style>
</head>

<body>

    <!-- 첫 번째 박스 -->
    <div class="div1">
        박스 속성과 값을 설정하는 방법
    </div>

    <!-- 두 번째 박스 -->
    <div class="div2">
        박스 속성과 값을 설정하는 방법
    </div>

    <!-- 세 번째 박스 -->
    <div class="div3">
        박스 속성과 값을 설정하는 방법
    </div>

</body>
</html>
