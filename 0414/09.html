<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .div1 {
        width : 300px;   /* 콘텐츠 영역의 가로 크기 */
        height : 300px;  /* 콘텐츠 영역의 세로 크기 */

        background-color: blue;  /* 배경색: 파랑 */
        color: #fff;             /* 글자색: 흰색 */

        border : 10px double rgb(56, 125, 75); 
        /* 테두리 두께 10px, 실선, 초록색 */

        margin: 50px 50px 0 50px;  
        padding: 0 50px 0 50px; 
        /* margin-right: 50px;
        margin-left: 50px;
        padding-right: 50px;
        padding-left: 50px; */
        text-align: center; 
        /* 가로 가운데 정렬 */

        line-height: 300px;
        /* 세로 가운데 정렬 (높이와 같게 해서 가운데 배치) */
    }

    .div2 {
        width : 400px;   /* 콘텐츠 영역의 가로 크기 */
        height : 400px;  /* 콘텐츠 영역의 세로 크기 */

        background-color:green;  /* 배경색: 파랑 */
        color: #fff;             /* 글자색: 흰색 */

        border : 20px ridge rgb(75, 221, 75); 
        /* 테두리 두께 10px, 실선, 초록색 */

        margin: 50px 50px 0 50px;  
        padding: 0 50px 0 50px; 
        /* margin-right: 50px;
        margin-left: 50px;
        padding-right: 50px;
        padding-left: 50px; */
        text-align: center; 
        /* 가로 가운데 정렬 */

        line-height: 400px;
        /* 세로 가운데 정렬 (높이와 같게 해서 가운데 배치) */
    }

     .div3 {
        width : 500px;   /* 콘텐츠 영역의 가로 크기 */
        height : 500px;  /* 콘텐츠 영역의 세로 크기 */

        background-color: purple;  /* 배경색: 파랑 */
        color: #fff;             /* 글자색: 흰색 */

        border-width: 30px;
        border-style: outset;
        border-color: azure;
        /* 테두리 두께 10px, 실선, 초록색 */

        margin: 50px 50px 0 50px;  
        padding: 0 50px 0 50px; 
        /* margin-right: 50px;
        margin-left: 50px;
        padding-right: 50px;
        padding-left: 50px; */
        text-align: center; 
        /* 가로 가운데 정렬 */

        line-height: 500px;
        /* 세로 가운데 정렬 (높이와 같게 해서 가운데 배치) */
    }
</style>
</head>
<body>
    <div class ="div1">박스 속성과 값을 설정하는 방법</div>
    <div class ="div2">박스 속성과 값을 설정하는 방법</div>
    <div class ="div3">박스 속성과 값을 설정하는 방법</div>
</body>
</html>
