            alert('안녕하세요~ 인라인 이벤트 모델 2');
        }
        function addStar(btn) {
            btn.textContent += '*';
        }
        function overChange(btn){
            btn.backgroundColor = 'yellow';
        }
        let count = 1;
        function changeImg(img){
            count++;
            if(count == 6){
                count = 1;
            }
            img.src = 'imgs/sea' + count + '.jpg';
        }
        function showImageSlide(){
          let img = document.getElementById("img2");
          setInterval(function(){
            count++;
            if(count == 6){
                count = 1;
            }
            img.src = 'imgs/sea' + count + '.jpg';
          }, 2000);
        }
    </script>
</head>
<body onload = "showImageSlide()">

</html>
