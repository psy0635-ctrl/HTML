<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- 모바일 화면 크기에 맞게 표시 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>인라인 이벤트 모델</title>

    <script>

        // =========================
        // 버튼 클릭 시 알림창 출력
        // =========================
        function greet() {
            alert('안녕하세요~ 인라인 이벤트 모델 2');
        }


        // =========================
        // 버튼에 별(*) 추가
        // this로 클릭한 버튼 전달
        // =========================
        function addStar(btn) {
            btn.textContent += '*';
        }


        // =========================
        // 마우스를 버튼 위에 올렸을 때
        // 배경색 노랑, 글자색 빨강
        // =========================
        function overChange(btn) {
            btn.style.backgroundColor = 'yellow';
            btn.style.color = 'red';
        }


        // =========================
        // 마우스가 버튼 밖으로 나갔을 때
        // 원래 색상으로 복원
        // =========================
        function outChange(btn) {
            btn.style.backgroundColor = '';
            btn.style.color = '';
        }


        // =========================
        // 현재 이미지 번호 저장
        // sea1.jpg ~ sea5.jpg
        // =========================
        let count = 1;


        // =========================
        // 이미지 클릭 시 다음 이미지로 변경
        // =========================
        function changeImg(img) {

            // 이미지 번호 증가
            count++;

            // sea5 다음은 sea1
            if (count == 6)
                count = 1;

            // 이미지 경로 변경
            img.src = 'imgs/sea' + count + '.jpg';
        }


        // =========================
        // 자동 슬라이드쇼 함수
        // 2초마다 이미지 변경
        // =========================
        function showImageSlide() {

            // id가 img2인 이미지 객체 가져오기
            let img = document.getElementById("img2");

            // 2000ms = 2초마다 반복 실행
            setInterval(function () {

                // 이미지 번호 증가
                count++;

                // sea5 다음은 sea1
                if (count == 6)
                    count = 1;

                // 이미지 변경
                img.src = 'imgs/sea' + count + '.jpg';

            }, 2000);
        }


        // =========================
        // HTML 문서가 모두 로드되면 실행
        // =========================
        window.onload = function () {

            // 자동 슬라이드쇼 시작
            showImageSlide();

            // id가 a1인 링크 객체 가져오기
            let a1 = document.getElementById("a1");

            // 링크 클릭 이벤트 등록
            a1.onclick = function (event) {

                // 기본 동작 제거
                // 원래는 네이버로 이동하지만
                // 이동하지 않도록 막음
                event.preventDefault();
            };
        };

    </script>
</head>

<body>

    <!-- 버튼 클릭 시 알림창 출력 -->
    <button onclick="alert('인라인 이벤트 모델 1')">
        인라인 이벤트 모델
    </button>

    <br><br>


    <!-- 함수 호출 -->
    <button onclick="greet()">
        인라인 이벤트 모델 2
    </button>

    <br><br>


    <!-- 클릭할 때마다 별(*) 추가 -->
    <button onclick="addStar(this)">
        별 추가
    </button>


    <!-- 마우스 올리면 색상 변경 -->
    <button
        onmouseover="overChange(this)"
        onmouseout="outChange(this)">
        배경 및 글자색 변경
    </button>

    <br><br>


    <!-- 클릭 시 이미지 변경 -->
    <img
        src="imgs/sea1.jpg"
        width="300"
        height="200"
        onclick="changeImg(this)"
        style="cursor:pointer;">

    <br><br>


    <!-- 자동 슬라이드쇼 이미지 -->
    <img
        src="imgs/sea1.jpg"
        width="300"
        height="200"
        id="img2">

    <br><br>


    <!-- 기본 이벤트 제거 예제 -->
    <!-- 원래는 네이버로 이동하지만 -->
    <!-- preventDefault() 때문에 이동 안 됨 -->
    <a href="https://www.naver.com/" id="a1">
        디폴트 이벤트 제거
    </a>

</body>
</html>
