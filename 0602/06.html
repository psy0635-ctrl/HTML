<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function callAlert() {
            let msg = document.getElementById("input1").value; // input 요소의 현재 텍스트 값을 읽어옵니다.
            alert(msg);
        }
    </script>
</head>
<body>
    <!-- <button onclick="alert('버튼이 클릭되었습니다!')">Click me</button> -->
    <input type="text" id="input1" placeholder="Enter text">
    <button onclick="callAlert()">Click me</button>
</body>
</html>
