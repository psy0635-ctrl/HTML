<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 스타일 조작</title>

    <script>
        /*
         * [이 파일의 목표]
         * JavaScript로 div 요소 256개를 만들고,
         * 각 div의 배경색을 검정(0,0,0)에서 흰색(255,255,255)으로
         * 점점 밝아지는 그라디언트(색상 그러데이션)를 만듭니다.
         *
         * [핵심 개념] CSS 스타일을 JavaScript로 직접 변경하기
         * 방법: 요소.style.속성이름 = "값";
         * 예시: divs[i].style.backgroundColor = "red";
         */

        // window.onload: 페이지가 전부 로드된 후 실행합니다.
        window.onload = function(){

            // output: div 태그들을 이어 붙일 빈 문자열 변수입니다.
            let output = "";

            // 0부터 255까지 총 256번 반복합니다. (RGB 색상 단계가 0~255이기 때문)
            for(let i=0; i < 256; i++){
                // 반복마다 빈 div 태그를 하나씩 추가합니다.
                // 결과: "<div></div><div></div>..." 가 256개 이어집니다.
                output += "<div></div>";
            }

            // 완성된 div 256개를 body 안에 HTML로 삽입합니다.
            document.body.innerHTML = output;

            // ▼ 두 가지 방법으로 div 요소들을 모두 선택할 수 있습니다.
            // 방법1 (주석 처리): getElementsByTagName - 태그 이름으로 선택
            // let divs = document.getElementsByTagName("div");

            // 방법2 (현재 사용): querySelectorAll - CSS 선택자 방식으로 선택
            // "div"라는 CSS 선택자로 페이지 안의 모든 div를 선택합니다.
            let divs = document.querySelectorAll("div");

            // 선택된 div 256개를 하나씩 순서대로 처리합니다.
            for(let i=0; i < divs.length; i++){

                // 각 div의 높이를 2px로 설정합니다. (얇은 선처럼 보이게)
                divs[i].style.height = '2px';

                // 배경색을 RGB 값으로 설정합니다.
                // i = 0일 때: rgb(0, 0, 0)   → 완전한 검정색
                // i = 127일 때: rgb(127,127,127) → 중간 회색
                // i = 255일 때: rgb(255,255,255) → 완전한 흰색
                // 이렇게 하면 검정 → 흰색으로 부드럽게 변하는 그라디언트가 됩니다!
                divs[i].style.backgroundColor = "rgb(" + i + ", " + i + ", " + i + ")";
            }
        }
    </script>
</head>
<body>
    <!-- body는 비어 있습니다. -->
    <!-- JavaScript가 실행되면서 div 256개가 자동으로 생성되어 채워집니다. -->
</body>
</html>
