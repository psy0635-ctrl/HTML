<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소객체 속성 조작</title>

    <script>
        /*
         * [이 파일의 목표]
         * 버튼을 클릭할 때마다 이미지가 바다 ↔ 동전 으로 번갈아 바뀝니다.
         *
         * [핵심 개념] 요소의 속성(attribute)을 JavaScript로 변경하기
         * 방법: 요소.속성이름 = "새로운 값";
         * 예시: img1.src = "새 이미지 경로";  // 이미지 주소를 바꿉니다.
         *       img1.width = 300;              // 이미지 너비를 바꿉니다.
         *
         * [토글(Toggle) 패턴]
         * 불리언(boolean) 변수 하나로 두 가지 상태를 번갈아 전환하는 방법입니다.
         * true → false → true → false ... 반복
         */

        // isSeaImage: "현재 바다 이미지가 보이고 있는가?"를 기억하는 스위치 변수입니다.
        // 자료형: boolean (true 또는 false 만 가질 수 있습니다)
        // 처음에는 이미지가 없으니 false(아니다)로 시작합니다.
        let isSeaImage = false;

        // changeImage(): 버튼을 클릭하면 호출되는 함수입니다.
        function changeImage() {

            // id가 "img1"인 <img> 요소를 찾아서 img1 변수에 저장합니다.
            // document.getElementById("아이디") : 아이디로 요소를 하나 찾는 함수
            let img1 = document.getElementById("img1");

            // 현재 바다 이미지가 보이지 않는 상태라면 (false)
            if (isSeaImage == false) {
                // 이미지 src 속성을 바다 이미지 경로로 바꿉니다.
                // src (source): 이미지 파일의 위치를 나타내는 속성
                img1.src = "imgs/sea.avif";

                // 스위치를 true로 바꿉니다. (이제 바다 이미지가 보이는 상태)
                isSeaImage = true;

            } else {
                // 현재 바다 이미지가 보이는 상태라면 (true)
                // 이미지를 동전 이미지로 바꿉니다.
                img1.src = "imgs/Coin image.jpg";

                // 스위치를 false로 바꿉니다. (다시 바다 이미지가 아닌 상태)
                isSeaImage = false;
            }

            // 어떤 이미지든 크기를 300 x 200 픽셀로 고정합니다.
            // if/else 블록 밖에 있으므로 이미지가 바뀔 때마다 항상 실행됩니다.
            img1.width = 300;
            img1.height = 200;
        }
    </script>
</head>
<body>
    <!-- 버튼을 클릭하면 onclick 속성에 적힌 changeImage() 함수가 실행됩니다. -->
    <button onclick="changeImage()">이미지 번갈아 보기</button>
    <br><br>

    <!-- img 태그: 이미지를 보여주는 태그입니다. -->
    <!-- id="img1": JavaScript에서 이 요소를 찾을 때 사용하는 고유 식별자입니다. -->
    <!-- 처음에는 src(이미지 경로)가 없으므로 이미지가 표시되지 않습니다. -->
    <img id="img1">
</body>
</html>
