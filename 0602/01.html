<!DOCTYPE html>
<!-- DOCTYPE: 이 파일이 HTML5 문서임을 브라우저에게 알려주는 선언입니다 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- charset="UTF-8": 한글이 깨지지 않도록 문자 인코딩을 설정합니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport: 모바일 기기에서도 화면이 올바르게 보이도록 설정합니다 -->
    <title>문자열 관련 속성들</title>

    <script>
        /*
         * [핵심 개념] textContent vs innerHTML
         *
         * textContent : 순수한 문자열 그대로 출력합니다.
         *               HTML 태그(<h1>, <p> 등)를 태그로 인식하지 않고
         *               문자 그대로 화면에 보여줍니다.
         *
         * innerHTML   : 문자열 안에 HTML 태그가 있으면 태그로 해석해서
         *               실제 HTML 요소로 만들어 화면에 보여줍니다.
         *
         * 비유: textContent는 "있는 그대로 읽기",
         *       innerHTML은 "HTML로 해석해서 적용하기"
         */

        // window.onload: 페이지가 완전히 불러와진 뒤에 이 함수를 실행합니다.
        // 페이지 로딩 전에 실행하면 body가 없어서 오류가 날 수 있기 때문입니다.
        window.onload = function(){

            // output: 나중에 화면에 출력할 문자열을 담을 빈 그릇(변수)입니다.
            let output = "";

            // for 반복문: i가 0부터 9까지 (10 미만) 총 10번 반복합니다.
            for (let i = 0; i < 10; i++){
                // 반복할 때마다 <h1> 태그 문자열을 이어 붙입니다.
                // 예: "<h1>Heading - 0</h1><h1>Heading - 1</h1>" ...
                output += "<h1>Heading - " + i + "</h1>";
            }

            // ▼ 현재 활성화된 코드: textContent 사용
            // <h1>...</h1> 태그가 태그로 인식되지 않고 문자 그대로 화면에 출력됩니다.
            // 결과: <h1>Heading - 0</h1> 이 글자 그대로 보입니다.
            document.body.textContent = output;

            // ▼ 비교해보기: 아래 주석을 해제하면 innerHTML로 바뀝니다.
            // <h1> 태그가 실제 제목 태그로 해석되어 큰 글씨로 10개 보입니다.
            // document.body.innerHTML = output;
        }
    </script>
</head>
<body>
    <!-- body는 비어 있습니다. -->
    <!-- JavaScript의 window.onload 함수가 실행되면서 body 내용을 채웁니다. -->
</body>
</html>
