<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 태그 중첩</title>
</head>
<body>
    <ul>  <!-- 순서 없는 목록 -->
        <li>  <!-- 목록 항목 -->
            <b>과일</b>   <!-- 굵은 글자 -->
            <ol>         <!-- 순서 있는 목록 -->
                <li>키위</li>
                <li>블루베리</li>
                <li>딸기</li>
            </ol>
        </li>
        <li>
            <b>채소</b>
            <ol>
                <li>상추</li>
                <li>시금치</li>
                <li>당근</li>
            </ol>
        </li>
    </ul>>
</body>
</html>
