<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 웹페이지</title>
</head>
<body>
    <table border="1">  <!--border="1" = 테두리 보이게-->   <!--table은 엑셀 파일 표--> 
        <thead> <!-- 표 제목 부분 -->
        <tr>     <!-- 표에 행 삽입 -->   
            <th></th>   <!--제목 칸-->
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
        </tr>
        </thead>  
        <tbody>                <!-- 표 내용 부분 -->
        <tr>
            <td>1교시</td>     <!-- 내용 칸-->
            <td>영어</td>
            <td>국어</td>
            <td>수학</td>
            <td>과학</td>
            <td>체육</td>
        </tr>
        <tr>
            <td>2교시</td>
            <td>미술</td>
            <td>사회</td>
            <td>음악</td>
            <td>영어</td>
            <td>국어</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
