<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 웹페이지</title>
</head>
<body>
    <h2>공백이      있는        문자열</h2>     
    <h2>공백이&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;있는&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;문자열</h2>   <!-- &nbsp;는 공백을 나타내는 HTML 엔티티입니다. -->
    <h3>10&lt;20</h3> <!-- &lt;는 < 기호를 나타내는 HTML 엔티티입니다. -->
    <h3>100&gt;50</h3> <!-- &gt;는 > 기호를 나타내는 HTML 엔티티입니다. -->
    <h3><Article>&amp;News</Article></h3> <!-- &amp;는 & 기호를 나타내는 HTML 엔티티입니다. -->
</body>
</html>
