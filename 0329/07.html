<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 만들기</title>
</head>
<body>
    <h3>순서 없는 목록</h3>  <!-- disc(default) | circle | square -->
    <ul type="disc">
        <li>키위</li>
        <li>블루베리</li>
        <li>딸기</li>
    </ul>

    <h3>순서 있는 목록</h3>  <!-- 1(default) | A | a | I | i -->
    <ol type="i">
        <li>키위</li>
        <li>블루베리</li>
        <li>딸기</li>
    </ol>
</body>
</html>
