<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수</title>
    <script>
        function add(num1, num2){
            let sum = num1 + num2;
            alert(num1 + " + " + num2 + " = " + sum); 
        }

        function greeting(message){
            alert("오늘의 인사말 : " + message);
        }

        add(10, 20);
        greeting("Good Morning!");
        add(6, 8);
        greeting("오늘은 정말 행복하세요.");

    </script>
</head>
<body>
    
</body>
</html>
