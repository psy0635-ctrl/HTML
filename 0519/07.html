<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 1부터 10까지의 합을 구하는 프로그램
        let sum = 0;

        for(let i = 1; i<=10 ; i++){
            sum += i;
            // sum = sum + i; 와 같은 의미
        }
          alert("1부터 10까지의 합: " + sum);
    </script>
</head>
