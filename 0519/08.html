<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let arrNames = ["장원영","안유진","카리나","레이","리즈","이서"];

        arrNames[2] = "가을";
        // 배열의 3번째 요소(인덱스 2)를 "가을"로 변경

        let iveNames = " ";

        for(let i = 0; i < arrNames.length; i++){
            iveNames += arrNames[i] + " ";
            // iveNames = iveNames + arrNames[i] + " " 와 같은 의미
        }

        arrNames.forEach(name => {
            iveNames += name + " ";
        });
     // forEach() = 배열의 요소를 처음부터 끝까지 하나씩 꺼내서 반복 실행
     // name      = 배열에서 꺼낸 요소 하나 (매 반복마다 자동으로 바뀜)
     // =>        = 화살표 함수, function(name){} 와 같은 의미

        alert(iveNames);
    </script>
</head>
<body>
    
</body>
</html>
