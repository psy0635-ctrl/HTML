<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let date = new Date();
        // new Date() = 현재 날짜와 시간을 나타내는 Date 객체 생성
        let year = date.getFullYear();
        // getFullYear() = Date 객체에서 연도(4자리)를 반환하는 메서드
        let month = date.getMonth() + 1;
        // getMonth() = Date 객체에서 월을 반환하는 메서드 (0~11, 0=1월, 11=12월)
        let day = date.getDate();
        // getDate() = Date 객체에서 일(1~31)을 반환하는 메서드
        let hours = date.getHours();
        // getHours() = Date 객체에서 시간(0~23)을 반환하는 메서드
        let minutes = date.getMinutes();
        // getMinutes() = Date 객체에서 분(0~59)을 반환하는 메서드
        let seconds = date.getSeconds();
        // getSeconds() = Date 객체에서 초(0~59)를 반환하는 메서드

        let ampm;

        if (hours > 12){
            ampm = "오후";
        } else {
            ampm = "오전";
            hours -= 12;
        }
        
        alert("오늘은 " + year + "년 " + month + "월 " + day + "일 " + ampm + " " + hours + "시 " + minutes + "분 " + seconds + "초입니다.");

    </script>
</head>
<body>
    
</body>
</html>
