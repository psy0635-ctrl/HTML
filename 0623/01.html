<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        $(document).ready(
            function() {
                let clearQueue = false;
                let goToEnd = false;

                $("#ClearQueue").change(function() {
                    clearQueue = $(this).prop("checked");
                });

                $("#GoToEnd").change(function() {
                    goToEnd = $(this).prop("checked");
                });

                $("#StopBtn").click(function() {
                    $("#box").stop(clearQueue, goToEnd);
                });

                $("#box").css({
                    width: 100,
                    height: 100,
                    backgroundColor: "magenta"
                });
         
                setInterval(function() {
                    $("#box").animate({
                        width: 200
                    }, 1000)
                    .delay(1000)
                    .animate({
                        width: 100
                    }, 1000);
                }, 3000);
            }
        );
    </script>
</head>
<body>
    <label>ClearQueue</label>
    <input type="checkbox" id="ClearQueue">
    <br>
    <label>GoToEnd</label>
    <input type="checkbox" id="GoToEnd">
    <br>
    <button id="StopBtn">Stop</button>
    <div id="box"></div>
</body>
</html>
