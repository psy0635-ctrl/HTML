<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 FontSize</title>
    <style>
        .first{
            font-size: 32px;
            font-style: italic;
        }
        .second{
            font-size: 2em;
            font-style: bold;
        }
        .third{
            font-size: large;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }
        .fourth{
            font-size: small;
            font-weight: bolder;
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>글자 속성 : Font Size</h1>
    <p>Lorem ipsum dolor sit amet</p>
    <p class = "first">Lorem ipsum dolor sit amet</p>
    <p class = "second">Lorem ipsum dolor sit amet</p>
    <p class = "third">Lorem ipsum dolor sit amet</p>
    <p class = "fourth">Lorem ipsum dolor sit amet</p>

</body>
</html>
